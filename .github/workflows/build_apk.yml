name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Export APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --no-pub
        env:
          JAVA_OPTS: "-Xmx3G"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx3G -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alkozay-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
