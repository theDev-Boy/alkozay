name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Export APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Fix legacy plugin namespace issues
        run: |
          echo "Patching old plugins that use package attribute in AndroidManifest.xml..."
          find ~/.pub-cache/hosted/pub.dev -name "AndroidManifest.xml" -path "*/android/src/main/*" | while read manifest; do
            if grep -q 'package=' "$manifest"; then
              echo "Patching: $manifest"
              sed -i 's/ package="[^"]*"//' "$manifest"
            fi
          done
          echo "Done patching manifests."

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        env:
          JAVA_OPTS: "-Xmx3G"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx3G -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alkozay-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
